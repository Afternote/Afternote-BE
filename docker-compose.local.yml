services:
  afternote-db:
    image: mysql:8.0
    container_name: afternote-local-db
    platform: linux/amd64
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: afternote
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - afternote-local-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 15

  afternote-redis:
    image: redis:alpine
    container_name: afternote-local-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  afternote-local-mysql-data:
