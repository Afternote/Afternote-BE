services:
  # =========================================
  # 1. Redis (캐시/세션)
  # =========================================
  afternote-redis:
    image: redis:alpine
    container_name: afternote-redis
    restart: always
    ports:
      - "6379:6379"

  # =========================================
  # 2. Spring Boot (AWS RDS 연결)
  # =========================================
  afternote-server:
    image: ${DOCKER_IMAGE}
    container_name: afternote-server
    depends_on:
      afternote-redis:
        condition: service_started
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Seoul
    env_file:
      - .env.production

  # =========================================
  # 3. Nginx (리버스 프록시)
  # =========================================
  afternote-nginx:
    image: nginx:alpine
    container_name: afternote-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - afternote-server

  # =========================================
  # 4. Certbot (인증서 갱신)
  # =========================================
  afternote-certbot:
    image: certbot/certbot
    container_name: afternote-certbot
    restart: always
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c
    command: "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;"
