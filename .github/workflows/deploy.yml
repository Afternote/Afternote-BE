name: Deploy to EC2 with Docker

on:
  push:
    branches: ["release"]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 가져오기
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. 자바 설치 (Java 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 3. Gradle 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 스프링 부트 빌드 (테스트 생략)
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 5. 도커 허브 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. 도커 이미지 빌드 & 푸시 (amd64 플랫폼 명시)
      - name: Build and Push Docker Image
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/afternote-server:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/afternote-server:latest

      # 7. EC2에 접속해서 배포 (SSH)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/deploy

            # 0. 배포 필수 파일/디렉토리 존재 체크
            if [ ! -f docker-compose.yml ]; then
              echo "[ERROR] docker-compose.yml not found in ~/deploy"
              exit 1
            fi

            if [ ! -f nginx/nginx.conf ]; then
              echo "[ERROR] nginx/nginx.conf not found in ~/deploy/nginx"
              exit 1
            fi

            if [ ! -d data/certbot/conf ]; then
              echo "[ERROR] data/certbot/conf directory not found"
              exit 1
            fi

            if [ ! -d data/certbot/www ]; then
              echo "[ERROR] data/certbot/www directory not found"
              exit 1
            fi

            # 1. 최신 이미지 pull 후 서비스 갱신 (.env 파일은 EC2에서 수동으로 관리)
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans --pull always

            # 2. 서버 기동 로그 확인
            sudo docker compose logs --tail=30 afternote-server 

            # 3. 안 쓰는 이미지 정리
            sudo docker image prune -f
