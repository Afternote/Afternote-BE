spring:
  application:
    name: AfterNote-Server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-flash-latest
            temperature: 0.7

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}

# ChaCha20-Poly1305 암호화 설정 (SOCIAL credentials 보호)
# 모바일 환경에 최적화된 암호화 (ARM 프로세서에서 AES보다 빠름)
security:
  chacha20:
    secret-key: ${CHACHA20_SECRET_KEY} # 32 bytes for ChaCha20

# CORS 설정 (환경별로 다르게 설정)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# 소셜 로그인 API 설정
kakao:
  api:
    user-info-url: https://kapi.kakao.com/v2/user/me

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.example.afternote: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO

app:
  auth-code:
    email:
      enabled: true

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
      region: ${AWS_REGION:ap-northeast-2}
    public-base-url: ${AWS_PUBLIC_BASE_URL:}
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
